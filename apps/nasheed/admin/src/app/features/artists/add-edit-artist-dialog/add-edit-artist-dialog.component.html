<div class="dialog-container">
  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="dialog-form">
    <!-- Name Field -->
    <z-form-field zardId="artistName" #f="zardId">
      <label z-form-label [for]="f.id()">{{ 'common.name' | translate }}</label>
      <z-form-control>
        <input
          z-input
          [id]="f.id()"
          formControlName="name"
          [placeholder]="'#anashid#.artists.form.namePlaceholder' | translate"
        />
      </z-form-control>
      @if (form.controls.name.touched && form.controls.name.hasError('required')) {
        <span z-form-error>{{ 'validation.required' | translate }}</span>
      }
      @if (form.controls.name.touched && form.controls.name.hasError('maxlength')) {
        <span z-form-error>{{ 'validation.maxLength' | translate: { max: 200 } }}</span>
      }
    </z-form-field>

    <!-- Image Upload -->
    <z-form-field zardId="artistImage" #img="zardId">
      <label z-form-label [for]="img.id()">{{ '#anashid#.artists.form.image' | translate }}</label>
      <z-form-control>
        <shared-file-selector
          [label]="'#anashid#.artists.form.imageLabel' | translate"
          [maxFiles]="1"
          selectionMode="single"
          [type]="FileType.Image"
          [group]="FileGroup.Personal"
          (filesChanged)="onImageSelected($event)"
        />
      </z-form-control>
    </z-form-field>

    @if (errorMessage()) {
      <z-alert zType="destructive" [zDescription]="errorMessage()!" />
    }

    <!-- Actions -->
    <div class="dialog-actions">
      <button
        z-button
        zType="outline"
        type="button"
        (click)="onCancel()"
        [disabled]="isLoading()"
        id="cancel-artist-button"
      >
        {{ 'common.cancel' | translate }}
      </button>
      <button
        z-button
        zType="default"
        type="submit"
        [disabled]="isLoading()"
        [zLoading]="isLoading()"
        id="submit-artist-button"
      >
        {{ (isEditMode ? 'common.save' : 'common.create') | translate }}
      </button>
    </div>
  </form>
</div>
