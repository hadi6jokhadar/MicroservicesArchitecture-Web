<div class="tenant-configuration-sheet">
  <div class="sheet-content">
    @if (isLoading()) {
    <div class="loading">
      <z-loader />
    </div>
    } @else {
    <div class="edit-form-container">
      <div class="edit-form">
        <div #editorContainer class="json-editor-container"></div>

        <div class="feature-flags-section">
          <div class="feature-flags-header">
            <h3>{{ 'tenants.featureFlags.title' | translate }}</h3>
            <p>{{ 'tenants.featureFlags.description' | translate }}</p>
          </div>

          <div class="feature-flags-list" [formGroup]="flagsForm">
            @for (flag of knownFlags; track flag.key) {
            <div class="flag-row">
              <div class="flag-info">
                <span class="flag-label">{{ flag.labelKey | translate }}</span>
                <span class="flag-desc">{{ flag.descKey | translate }}</span>
              </div>
              <z-switch [formControlName]="flag.key" />
            </div>
            }
          </div>
        </div>

        @if (errorMessage()) {
        <z-alert zType="destructive">{{ errorMessage() }}</z-alert>
        }

        <div class="form-actions">
          <button
            z-button
            zType="outline"
            zSize="default"
            type="button"
            (click)="onCancel()"
            [disabled]="isSaving()"
            id="cancel-config-btn"
          >
            {{ 'common.cancel' | translate }}
          </button>
          <button
            z-button
            zType="default"
            zSize="default"
            type="button"
            (click)="onSubmit()"
            [disabled]="isSaving()"
            [zLoading]="isSaving()"
            id="save-config-btn"
          >
            {{ 'common.save' | translate }}
          </button>
        </div>
      </div>
    </div>
    }
  </div>
</div>
