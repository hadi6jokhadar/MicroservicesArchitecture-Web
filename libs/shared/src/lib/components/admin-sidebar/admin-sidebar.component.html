<!-- Toggle button - positioned based on sidebar visibility -->
@if(!isVisible()){
<mat-icon
  class="visibility-toggle"
  (click)="toggleVisibility()"
  (mouseenter)="showSidebar()"
  fontIcon="arrow_right"
></mat-icon>
}

<!-- Sidebar container - shown/hidden with animation -->
<div
  class="sidebar-container"
  [class.expanded]="showLabels()"
  [class.hidden]="!isVisible()"
  (mouseenter)="onSidebarMouseEnter()"
  (mouseleave)="onSidebarMouseLeave()"
>
  <div class="toggle-container">
    <button mat-icon-button (click)="toggleLabels()" class="toggle-button">
      <mat-icon
        [fontIcon]="showLabels() ? 'toggle_on' : 'toggle_off'"
      ></mat-icon>
    </button>
  </div>

  <nav class="nav-list">
    @for (item of navItems; track item.label; let i = $index) { @if
    (showLabels()) {
    <button
      mat-button
      class="nav-item has-label"
      [class.active]="selectedIndex() === i"
      (click)="selectItem(i)"
    >
      <mat-icon class="nav-icon">{{ item.icon }}</mat-icon>
      <span class="nav-label">{{ item.label }}</span>
    </button>
    } @else {
    <button
      mat-icon-button
      class="nav-item"
      [class.active]="selectedIndex() === i"
      (click)="selectItem(i)"
      [matTooltip]="item.label"
      matTooltipPosition="right"
      matTooltipClass="sidebar-tooltip"
    >
      <mat-icon class="nav-icon">{{ item.icon }}</mat-icon>
    </button>
    } }
  </nav>
</div>
